<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Fantasy Battles - Army Builder</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #f5f5f0;
      overflow: hidden;
    }
    
    #root {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/auth-screens.jsx"></script>
  <script type="text/babel" src="army-builder-compact-inline.jsx"></script>
  <script type="text/babel" src="army-builder-cards-inline.jsx"></script>
  <script type="text/babel" src="army-builder-tactical-inline.jsx"></script>
  
  <script type="text/babel">
    const { useState } = React;
    
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="auth" title="Authentication Screens">
            <DCArtboard id="auth-login" label="Login Screen" width={375} height={812}>
              <AuthLoginScreen />
            </DCArtboard>
            <DCArtboard id="auth-signup" label="Sign Up Screen" width={375} height={812}>
              <AuthSignupScreen />
            </DCArtboard>
          </DCSection>
          
          <DCSection id="layouts" title="Army Builder Layout Variations">
            <DCArtboard id="compact" label="Compact List View" width={1440} height={900}>
              <ArmyBuilderCompact />
            </DCArtboard>
            <DCArtboard id="cards" label="Card-Based View" width={1440} height={900}>
              <ArmyBuilderCards />
            </DCArtboard>
            <DCArtboard id="tactical" label="Tactical Grid View" width={1440} height={900}>
              <ArmyBuilderTactical />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
